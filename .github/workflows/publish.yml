on:
  workflow_dispatch:
  push:
    branches: main

name: Render and publish to GitHub Pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev pkg-config libpng-dev libjpeg-dev \
            libfreetype6-dev cmake libgit2-dev libx11-dev pandoc \
            libnode-dev

      - name: Install R dependencies (renv)
        uses: r-lib/actions/setup-renv@v2

      - name: Render Quarto site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Set up Node (for staticrypt)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Each event landing page under _site/<event>/ is encrypted with its own
      # password. The committed .passwords file (lines of the form
      # <event>=<password>) is the single source of truth: it lists exactly the
      # event folders to encrypt and the password for each. Everything else (the
      # public splash, the shared workshops/, agendas/ and resources/) is left
      # unencrypted. The repo is private; rotate passwords (and rewrite history
      # if needed) before any visibility change.
      #
      # The salt is pinned so staticrypt's "remember me" sessions survive across
      # builds and stay consistent across the separately encrypted event folders.
      # It is not secret (it ships inside every encrypted file).
      - name: Encrypt event pages with staticrypt
        run: |
          set -euo pipefail
          SALT="b48ca499be7985fe67d68b82074a1355"
          # `|| [ -n "$event" ]` ensures a final line with no trailing newline
          # is still processed (read returns non-zero at EOF but still fills the
          # variables).
          while IFS='=' read -r event password || [ -n "$event" ]; do
            # Skip blank lines and comments in .passwords.
            [ -z "$event" ] && continue
            case "$event" in \#*) continue ;; esac
            if [ -z "$password" ]; then
              echo "::error::No password for event '${event}' in .passwords"
              exit 1
            fi
            event_dir="_site/${event}"
            if [ ! -d "$event_dir" ]; then
              echo "::error::Event folder '${event_dir}' not found in rendered site"
              exit 1
            fi
            # Pass <dir>/* (not <dir>) with --directory <dir> so staticrypt
            # overwrites files in place instead of nesting under <dir>/<dir>/.
            shopt -s nullglob
            npx --yes staticrypt "${event_dir}"/* \
              --recursive \
              --short \
              --remember 7 \
              --salt "$SALT" \
              --directory "$event_dir" \
              --template .staticrypt/template.html \
              --template-title "ESQlabs R Workshop — ${event}" \
              --template-instructions "Enter the password shared with registered participants for this event to continue." \
              --template-button "Unlock workshop" \
              --template-placeholder "Workshop password" \
              --template-remember "Remember me on this device for 7 days" \
              --template-error "Incorrect password, please try again." \
              -p "$password"
          done < .passwords

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
