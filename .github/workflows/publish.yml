on:
  workflow_dispatch:
  push:
    branches: main

name: Render and publish to GitHub Pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev pkg-config libpng-dev libjpeg-dev \
            libfreetype6-dev cmake libgit2-dev libx11-dev pandoc \
            libnode-dev

      - name: Install R dependencies (renv)
        uses: r-lib/actions/setup-renv@v2

      - name: Render Quarto site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Set up Node (for staticrypt)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Password is read from the committed .workshop-password file. The repo
      # is private; rotate the password (and rewrite history if needed) before
      # any visibility change.
      - name: Encrypt site with staticrypt
        run: |
          PASSWORD="$(tr -d '\n' < .workshop-password)"
          # Pass _site/* (not _site) so staticrypt overwrites files in place
          # instead of nesting encrypted output under _site/_site/.
          shopt -s nullglob
          npx --yes staticrypt _site/* \
            --recursive \
            --short \
            --remember 7 \
            --directory _site \
            --template .staticrypt/template.html \
            --template-title "PAGE 2026 R Workshop" \
            --template-instructions "This site hosts the materials for the PAGE 2026 pre-conference workshop. Enter the password shared with registered participants to continue." \
            --template-button "Unlock workshop" \
            --template-placeholder "Workshop password" \
            --template-remember "Remember me on this device for 7 days" \
            --template-error "Incorrect password, please try again." \
            -p "$PASSWORD"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
