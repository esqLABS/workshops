project:
  type: website
  execute-dir: project
  resources:
    - robots.txt
  render:
    - "*.qmd"
    # Exclude project-internal reports that are hands-on exercises and rely on
    # configuration files participants fill in during the workshop. They are
    # rendered locally by participants, not as part of the published website.
    - "!workshops/resources/projects/**/Reports/*.qmd"
  pre-render: scripts/clean-quarto-temp.R

website:
  title: "PAGE 2026 R Workshop"
  description: "R workshop materials for PAGE 2026, by ESQlabs."
  favicon: "resources/favicon.ico"
  site-url: "https://esqlabs.github.io/PAGE2026-R-WORKSHOP/"
  repo-url: "https://github.com/esqLABS/PAGE2026-R-WORKSHOP"

execute:
  freeze: auto  # re-render only when source changes
