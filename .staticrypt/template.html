        <meta http-equiv="expires" content="0" />

        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

            rel="stylesheet"
        />

        <style>
            :root {
                --esq-teal: #4abdcb;
                --esq-green: #76bb60;
                --esq-coral: #ea615e;
                --esq-ink: #1f2a37;
                --esq-muted: #6b7785;
                --esq-bg: #f6f8fb;
                --esq-card: #ffffff;
                --esq-border: #e5ebf2;
            }

            * { box-sizing: border-box; }

            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
            }

            body.staticrypt-body {
                font-family: "Inter", -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                color: var(--esq-ink);
                background: var(--esq-bg);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 16px;
                background:
                    radial-gradient(
                        ellipse at top left,
                        rgba(74, 189, 203, 0.10),
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse at bottom right,
                        rgba(118, 187, 96, 0.10),
                        transparent 60%
                    ),
                    var(--esq-bg);
            }

            .staticrypt-page {
                width: 100%;
                max-width: 460px;
            }

            .esq-card {
                background: var(--esq-card);
                border: 1px solid var(--esq-border);
                border-radius: 16px;
                padding: 40px 36px 32px;
                box-shadow:
                    0 1px 2px rgba(15, 23, 42, 0.04),
                    0 12px 32px rgba(15, 23, 42, 0.08);
            }

            .esq-logo {
                display: block;
                width: 200px;
                max-width: 70%;
                height: auto;
                margin: 0 auto 28px;
            }

            .staticrypt-title {
                font-size: 1.35rem;
                font-weight: 600;
                line-height: 1.35;
                text-align: center;
                margin: 0 0 8px;
                color: var(--esq-ink);
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 0.95rem;
                line-height: 1.5;
                color: var(--esq-muted);
                text-align: center;
                margin: 0 0 4px;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid var(--esq-border);
                margin: 24px 0 20px;
            }

            #staticrypt-form {
                text-align: left;
            }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 16px;
            }

            #staticrypt-form input[type="password"],
            #staticrypt-form input[type="text"] {
                width: 100%;
                font-family: inherit;
                font-size: 1rem;
                color: var(--esq-ink);
                background: #ffffff;
                border: 1px solid var(--esq-border);
                border-radius: 10px;
                padding: 14px 44px 14px 16px;
                outline: none;
                transition: border-color 120ms ease, box-shadow 120ms ease;
            }

            #staticrypt-form input[type="password"]:focus,
            #staticrypt-form input[type="text"]:focus {
                border-color: var(--esq-teal);
                box-shadow: 0 0 0 3px rgba(74, 189, 203, 0.18);
            }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                opacity: 0.55;
                cursor: pointer;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                font-size: 0.9rem;
                color: var(--esq-muted);
                margin: 0 0 18px;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin-right: 10px;
                accent-color: var(--esq-teal);
            }

            #staticrypt-form .staticrypt-decrypt-button,
            input.staticrypt-decrypt-button {
                display: block;
                width: 100%;
                background: var(--esq-teal);
                color: #ffffff;
                font-family: inherit;
                font-size: 0.95rem;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                border: 0;
                border-radius: 10px;
                padding: 14px 16px;
                margin: 0;
                cursor: pointer;
                transition: background-color 120ms ease, transform 80ms ease;
                -webkit-appearance: none;
                appearance: none;
            }

            #staticrypt-form .staticrypt-decrypt-button:hover,
            input.staticrypt-decrypt-button:hover {
                background: #3da8b6;
            }

            #staticrypt-form .staticrypt-decrypt-button:active,
            input.staticrypt-decrypt-button:active {
                transform: translateY(1px);
            }

            #staticrypt-form .staticrypt-decrypt-button:focus,
            input.staticrypt-decrypt-button:focus {
                outline: 0;
                box-shadow: 0 0 0 3px rgba(74, 189, 203, 0.30);
            }

            .esq-footer {
                margin-top: 18px;
                font-size: 0.78rem;
                color: var(--esq-muted);
                text-align: center;
            }

            .esq-footer a {
                color: var(--esq-muted);
                text-decoration: none;
                border-bottom: 1px dotted var(--esq-border);
            }

            .esq-footer a:hover { color: var(--esq-teal); }

            .hidden { display: none !important; }

            /* Loading spinner */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid var(--esq-border);
                border-right-color: var(--esq-teal);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            /* iOS Safari: stop auto-zoom on focus */
            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                #staticrypt-form input[type="password"],
                #staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .esq-card {
                    padding: 32px 24px 28px;
                    border-radius: 14px;
                }
                .staticrypt-title { font-size: 1.2rem; }
            }
        </style>
    </head>
